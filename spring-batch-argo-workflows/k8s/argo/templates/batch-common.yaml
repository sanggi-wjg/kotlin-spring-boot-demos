apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: batch-common
  namespace: batch
  labels:
    app.kubernetes.io/part-of: mall-v4-batch
spec:
  templates:
    # ──────────────────────────────────────────────
    # https://argo-workflows.readthedocs.io/en/latest/http-template/
    # trigger-job: POST /api/v1/batch/jobs/{jobName}
    # - Job을 API 호출하고 API에서 받은 executionId를 반환
    # - 팟 전체 다운 및 재기동까지 고려하여 최대 2분 까지 재시도
    # ──────────────────────────────────────────────
    - name: trigger-job
      inputs:
        parameters:
          - name: jobName
          - name: params
            default: "{}"
      retryStrategy: # https://argo-workflows.readthedocs.io/en/latest/retries/
        limit: "100" # maxDuration 설정으로 재시도 시간이 maxDuration 시간을 초과한다면 무시되는 설정이다.
        backoff: # https://raw.githubusercontent.com/argoproj/argo-workflows/main/examples/retry-backoff.yaml
          duration: "10s" # 초기 대기 시간
          factor: 1 # 배수
          maxDuration: "2m" # 최대 대기시간
        retryPolicy: Always
      http:
        url: "http://batch-api-server.batch.svc.cluster.local:8080/api/v1/batch/jobs/{{inputs.parameters.jobName}}"
        method: POST
        headers:
          - name: Content-Type
            value: application/json
        body: "{{inputs.parameters.params}}"
        successCondition: "response.statusCode == 202 || response.statusCode == 409"

    # ──────────────────────────────────────────────
    # poll-job-until-done: GET /api/v1/batch/jobs/executions/{id}
    # - 10초 간격 폴링, 최대 15분
    # - 실행 완료(200) 시 성공 (COMPLETED/FAILED 무관)
    # ──────────────────────────────────────────────
    - name: poll-job-until-done
      inputs:
        parameters:
          - name: executionId
      retryStrategy:
        limit: "100"
        backoff:
          duration: "10s"
          factor: 1
          maxDuration: "15m"
        retryPolicy: Always
      http:
        url: "http://batch-api-server.batch.svc.cluster.local:8080/api/v1/batch/jobs/executions/{{inputs.parameters.executionId}}"
        method: GET
        successCondition: "response.statusCode == 200"

    # ──────────────────────────────────────────────
    # long-poll-job-until-done: GET /api/v1/batch/jobs/executions/{id}
    # - 30초 간격 폴링, 최대 3시간
    # - 장시간 Job 전용
    # ──────────────────────────────────────────────
    - name: long-poll-job-until-done
      inputs:
        parameters:
          - name: executionId
      retryStrategy:
        retryPolicy: Always
        limit: "360"
        backoff:
          duration: "30s"
          factor: 1
          maxDuration: "3h"
      http:
        url: "http://batch-api-server.batch.svc.cluster.local:8080/api/v1/batch/jobs/executions/{{inputs.parameters.executionId}}"
        method: GET
        successCondition: "response.statusCode == 200"

    # ──────────────────────────────────────────────
    # verify-job-result: Job 실행 결과 검증
    # - COMPLETED 상태일 때만 성공
    # - FAILED 등 다른 상태는 즉시 실패 처리
    # ──────────────────────────────────────────────
    - name: verify-job-result
      inputs:
        parameters:
          - name: executionId
      http:
        url: "http://batch-api-server.batch.svc.cluster.local:8080/api/v1/batch/jobs/executions/{{inputs.parameters.executionId}}"
        method: GET
        successCondition: "response.statusCode == 200 && response.body contains \"COMPLETED\""

    # ──────────────────────────────────────────────
    # poll-job-completion: Job 완료까지 폴링 + 결과 검증
    # - poll-job-until-done으로 실행 완료를 대기한 뒤
    #   verify-job-result로 COMPLETED 여부를 검증
    # - FAILED 시 즉시 워크플로우 실패 처리
    # ──────────────────────────────────────────────
    - name: poll-job-completion
      inputs:
        parameters:
          - name: executionId
      steps:
        - - name: poll
            template: poll-job-until-done
            arguments:
              parameters:
                - name: executionId
                  value: "{{inputs.parameters.executionId}}"
        - - name: verify
            template: verify-job-result
            arguments:
              parameters:
                - name: executionId
                  value: "{{inputs.parameters.executionId}}"

    # ──────────────────────────────────────────────
    # long-poll-job-completion: 장시간 Job 완료까지 폴링 + 결과 검증
    # - long-poll-job-until-done으로 실행 완료를 대기한 뒤
    #   verify-job-result로 COMPLETED 여부를 검증
    # - FAILED 시 즉시 워크플로우 실패 처리
    # ──────────────────────────────────────────────
    - name: long-poll-job-completion
      inputs:
        parameters:
          - name: executionId
      steps:
        - - name: poll
            template: long-poll-job-until-done
            arguments:
              parameters:
                - name: executionId
                  value: "{{inputs.parameters.executionId}}"
        - - name: verify
            template: verify-job-result
            arguments:
              parameters:
                - name: executionId
                  value: "{{inputs.parameters.executionId}}"

    # ──────────────────────────────────────────────
    # restart-job: POST /api/v1/batch/jobs/executions/{id}/restart
    # - 실패한 Job을 재시작하고 새 executionId를 반환
    # ──────────────────────────────────────────────
    - name: restart-job
      inputs:
        parameters:
          - name: executionId
      retryStrategy:
        limit: "100"
        backoff:
          duration: "10s"
          factor: 1
          maxDuration: "2m"
        retryPolicy: Always
      http:
        url: "http://batch-api-server.batch.svc.cluster.local:8080/api/v1/batch/jobs/executions/{{inputs.parameters.executionId}}/restart"
        method: POST
        successCondition: "response.statusCode == 200 || response.statusCode == 409"

    # ──────────────────────────────────────────────
    # notify-slack-on-failure: 워크플로우 실패 시 Slack Webhook 알림 전송
    # - onExit handler에서 호출
    # - 워크플로우 상태가 Succeeded가 아닐 때만 전송
    # - when 조건은 step 레벨에서만 동작하므로 steps 템플릿으로 감싸서 처리
    # ──────────────────────────────────────────────
    - name: notify-slack-on-failure
      inputs:
        parameters:
          - name: workflowName
          - name: workflowStatus
      steps:
        - - name: send
            when: "{{inputs.parameters.workflowStatus}} != Succeeded"
            template: send-slack-on-failure
            arguments:
              parameters:
                - name: workflowName
                  value: "{{inputs.parameters.workflowName}}"
                - name: workflowStatus
                  value: "{{inputs.parameters.workflowStatus}}"

    - name: send-slack-on-failure
      inputs:
        parameters:
          - name: workflowName
          - name: workflowStatus
      container:
        image: alpine:3.19
        command: [echo]
        args:
          - "🚨 *[Batch 실패]* {{inputs.parameters.workflowName}} (status: {{inputs.parameters.workflowStatus}})"
